
source = var.conf

#===============#
#= KEYBINDINGS =#

# See https://wiki.hypr.land/Configuring/Keywords/

bind = $k.main, Q,        killactive,
bind = $k.main, Escape,   exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Open program

bind = $k.main, $k.enter, exec, $terminal
bind = $k.main, E,        exec, $fileManager
bind = $k.main, T,        exec, $p.telegram



bind = $k.main, Space,    exec, $launcher
bind = $k.main, V,          exec, $clipboard

# Window
bind = $k.main, X,        togglefloating,
bind = ,        f11,      fullscreen
bind = $k.main, P,        pin

# Move focus with mainMod + arrow keys
bind = $k.main, left,     movefocus, l
bind = $k.main, right,    movefocus, r
bind = $k.main, up,       movefocus, u
bind = $k.main, down,     movefocus, d

# Resizing window
bind = $k.main SHIFT, H, resizeactive, -10 0
bind = $k.main SHIFT, L, resizeactive, 10 0
bind = $k.main SHIFT, K, resizeactive, 0 -10
bind = $k.main SHIFT, J, resizeactive, 0 10

# Switch workspaces with mainMod + [0-9]
bind = $k.main, 1, workspace, 1
bind = $k.main, 2, workspace, 2
bind = $k.main, 3, workspace, 3
bind = $k.main, 4, workspace, 4
bind = $k.main, 5, workspace, 5
bind = $k.main, 6, workspace, 6
bind = $k.main, 7, workspace, 7
bind = $k.main, 8, workspace, 8
bind = $k.main, 9, workspace, 9
bind = $k.main, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $k.main SHIFT, 1, movetoworkspace, 1
bind = $k.main SHIFT, 2, movetoworkspace, 2
bind = $k.main SHIFT, 3, movetoworkspace, 3
bind = $k.main SHIFT, 4, movetoworkspace, 4
bind = $k.main SHIFT, 5, movetoworkspace, 5
bind = $k.main SHIFT, 6, movetoworkspace, 6
bind = $k.main SHIFT, 7, movetoworkspace, 7
bind = $k.main SHIFT, 8, movetoworkspace, 8
bind = $k.main SHIFT, 9, movetoworkspace, 9
bind = $k.main SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $k.main, S, togglespecialworkspace, magic
bind = $k.main SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $k.main, mouse_down, workspace, e+1
bind = $k.main, mouse_up,   workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $k.main, mouse:272, movewindow
bindm = $k.main, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Requires playerctl
bindl = , XF86AudioNext,    exec, playerctl next
bindl = , XF86AudioPause,   exec, playerctl play-pause
bindl = , XF86AudioPlay,    exec, playerctl play-pause
bindl = , XF86AudioPrev,    exec, playerctl previous
